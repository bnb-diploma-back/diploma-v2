plugins {
	id 'org.jooq.jooq-codegen-gradle' version '3.20.11'
}

dependencies {
	implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
	implementation 'org.springframework.boot:spring-boot-starter-test'
	implementation 'org.jooq:jooq'

	compileOnly 'org.projectlombok:lombok'
	annotationProcessor 'org.projectlombok:lombok'

	jooqCodegen 'org.postgresql:postgresql'
}

def skipJooq = project.hasProperty('skipJooqCodegen') || System.getenv('DYNO') != null

sourceSets {
	main {
		java {
			srcDir skipJooq
					? layout.projectDirectory.dir('src/main/jooq-generated')
					: layout.buildDirectory.dir('generated-sources/jooq')
		}
	}
}

jooq {
	configuration {
		jdbc {
			driver = 'org.postgresql.Driver'
			url = 'jdbc:postgresql://localhost:5432/bnb_db'
			user = 'postgres'
			password = 'postgres'
		}
		generator {
			database {
				name = 'org.jooq.meta.postgres.PostgresDatabase'
				inputSchema = 'public'
			}
			generate {
				javadoc = false
				keys = false
				records = false
				sequences = false
				sequenceFlags = false
				routines = false
				pojos = true
				pojosAsJavaRecordClasses = true
			}
			database {
				schemata {
					schema {
						inputSchema = "public"
					}
				}
			}

			target {
				packageName = 'sdu.edu.kz.diploma.library.jooq'
				directory = layout.projectDirectory.dir('src/main/jooq-generated').asFile.absolutePath
			}
		}
	}
}

if (skipJooq) {
	tasks.named('compileJava') {
		// Skip jooqCodegen when no DB available (e.g. Heroku build)
	}
} else {
	tasks.named('compileJava') {
		dependsOn tasks.named('jooqCodegen')
	}
}