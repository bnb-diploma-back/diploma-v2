name: Build and Push Docker Image

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: eatcodepray/bnb-diploma-migration:latest
        ports:
          - 5432:5432

      test-db:
        image: eatcodepray/bnb-diploma-migration:test
        ports:
          - 5433:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Build and Test
        run: ./gradlew clean build

      - name: Build Docker image with bootBuildImage
        run: ./gradlew launcher:bootBuildImage -PdockerImageTag=latest

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Tag and push Docker image
        if: github.event_name == 'push'
        run: |
          docker tag bnb-diploma-backend:latest ${{ secrets.DOCKER_HUB_USERNAME }}/bnb-diploma-backend:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/bnb-diploma-backend:latest